name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: uv pip install --system -e .
      - name: Test imports
        run: python -c "from riskgraph.scorer import score_package; r=score_package('lodash','npm'); print(f'OK: {r.score}')"
